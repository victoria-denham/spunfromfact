name: Deploy to Tiiny Host

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip site files
        run: |
          cd dist
          zip -r ../site.zip index.html sff-mark.png fonts/
          echo "Zip contents:"
          unzip -l ../site.zip

      - name: Deploy to Tiiny Host
        run: |
          echo "Deploying to spunfromfact.tiiny.site..."
          curl -v -X POST "https://api.tiiny.site" \
            -H "Authorization: Bearer ${{ secrets.TIINY_API_TOKEN }}" \
            -F "file=@site.zip" \
            -F "domain=spunfromfact" \
            -F "tiny-url=spunfromfact" \
            2>&1
